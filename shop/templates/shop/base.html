<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 NG Srirangam Flower Shop</title>
<style>
:root {
  --purple:#7c3aed; --purple-d:#6d28d9; --purple-l:#ede9fe;
  --pink:#ec4899; --green:#10b981; --amber:#f59e0b;
  --red:#ef4444; --blue:#3b82f6;
  --bg:#faf5ff; --card:#fff; --text:#1f2937; --muted:#6b7280;
  --border:#e5e7eb; --shadow:0 4px 24px rgba(124,58,237,.12);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);}

/* NAV */
.nav{background:linear-gradient(135deg,#5b21b6,#7c3aed,#9d4edd);
  padding:0 24px;display:flex;align-items:center;justify-content:space-between;
  height:60px;position:sticky;top:0;z-index:200;
  box-shadow:0 2px 16px rgba(91,33,182,.4);}
.nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:#fff;}
.nav-brand img{width:36px;height:36px;border-radius:50%;object-fit:cover;}
.nav-brand span{font-size:1.1rem;font-weight:800;letter-spacing:.3px;}
.nav-links{display:flex;align-items:center;gap:6px;}
.nav-links a{color:rgba(255,255,255,.9);text-decoration:none;padding:7px 14px;
  border-radius:8px;font-size:.88rem;font-weight:600;transition:.2s;}
.nav-links a:hover{background:rgba(255,255,255,.15);}
.nav-cart{background:var(--amber)!important;color:#fff!important;border-radius:20px!important;
  padding:7px 16px!important;display:flex;align-items:center;gap:6px;}
.badge{background:#fff;color:var(--amber);border-radius:50%;width:20px;height:20px;
  display:inline-flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:800;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:10px 22px;border-radius:12px;font-size:.95rem;font-weight:700;
  cursor:pointer;border:none;text-decoration:none;transition:.2s;line-height:1;}
.btn:hover{transform:translateY(-1px);filter:brightness(1.08);}
.btn-purple{background:var(--purple);color:#fff;}
.btn-green{background:var(--green);color:#fff;}
.btn-amber{background:var(--amber);color:#fff;}
.btn-red{background:var(--red);color:#fff;}
.btn-blue{background:var(--blue);color:#fff;}
.btn-wa{background:#25D366;color:#fff;font-size:1.05rem;padding:14px 28px;}
.btn-outline{background:#fff;color:var(--purple);border:2px solid var(--purple);}
.btn-sm{padding:7px 14px;font-size:.82rem;border-radius:9px;}
.btn-block{width:100%;padding:14px;}

/* CARD */
.card{background:var(--card);border-radius:18px;box-shadow:var(--shadow);}

/* TABS (payment) */
.tab-bar{display:flex;border-bottom:2px solid var(--border);margin-bottom:20px;gap:4px;}
.tab{padding:10px 18px;cursor:pointer;border:none;background:none;
  font-size:.9rem;font-weight:700;color:var(--muted);border-radius:10px 10px 0 0;transition:.2s;}
.tab.active{color:var(--purple);background:var(--purple-l);border-bottom:2px solid var(--purple);}
.tab-panel{display:none;} .tab-panel.active{display:block;}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);
  z-index:1000;align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal-box{background:#fff;border-radius:20px;max-width:480px;width:92%;
  padding:20px;position:relative;text-align:center;}
.modal-box img{width:100%;border-radius:14px;max-height:380px;object-fit:contain;}
.modal-close{position:absolute;top:12px;right:14px;font-size:1.5rem;
  cursor:pointer;background:none;border:none;color:var(--muted);}
.modal-box h3{margin-top:12px;color:var(--purple);font-size:1.05rem;}

/* FORM */
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-weight:700;font-size:.88rem;color:#374151;margin-bottom:5px;}
.form-group input,.form-group textarea,.form-group select{
  width:100%;padding:10px 14px;border-radius:10px;border:1.5px solid var(--border);
  font-size:.95rem;transition:.2s;font-family:inherit;}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{
  outline:none;border-color:var(--purple);box-shadow:0 0 0 3px rgba(124,58,237,.1);}

/* PAYMENT CARD */
.pay-card{border:2px solid var(--border);border-radius:16px;padding:18px;cursor:pointer;
  margin-bottom:12px;transition:.2s;position:relative;}
.pay-card.selected{border-color:var(--purple);background:var(--purple-l);}
.pay-card:hover{border-color:#a78bfa;}
.pay-icon{font-size:1.8rem;margin-bottom:6px;}
.pay-title{font-weight:800;font-size:1rem;color:var(--text);}
.pay-desc{font-size:.82rem;color:var(--muted);margin-top:3px;}

/* QR BOX */
.qr-box{background:linear-gradient(135deg,#f0fdf4,#dcfce7);border:2px solid #86efac;
  border-radius:16px;padding:20px;text-align:center;}
.qr-box canvas,.qr-box img{border-radius:12px;border:4px solid #fff;
  box-shadow:0 4px 16px rgba(0,0,0,.12);}

/* INFO STRIP */
.info-strip{background:var(--purple-l);border-left:4px solid var(--purple);
  border-radius:0 12px 12px 0;padding:12px 16px;font-size:.88rem;color:#5b21b6;margin:10px 0;}
.info-strip.green{background:#d1fae5;border-color:var(--green);color:#065f46;}
.info-strip.amber{background:#fef3c7;border-color:var(--amber);color:#92400e;}
.info-strip.red{background:#fee2e2;border-color:var(--red);color:#991b1b;}

/* STATUS BADGE */
.sbadge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:.78rem;font-weight:700;}
.sbadge-purple{background:var(--purple-l);color:var(--purple);}
.sbadge-green{background:#d1fae5;color:#065f46;}
.sbadge-amber{background:#fef3c7;color:#92400e;}
.sbadge-red{background:#fee2e2;color:#991b1b;}
.sbadge-blue{background:#dbeafe;color:#1e40af;}

footer{text-align:center;padding:28px;color:var(--muted);font-size:.88rem;
  border-top:1px solid var(--border);margin-top:50px;}
</style>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-brand">
    <span>🌸 NG Srirangam Flower Shop</span>
  </a>
  <div class="nav-links">
    <a href="/">🏠 Home</a>
    <a href="/orders/">📋 Orders</a>
    <a href="/cart/" class="nav-cart">🛒 Cart <span class="badge">{{ cart_count }}</span></a>
  </div>
</nav>

{% block content %}{% endblock %}

<!-- IMAGE MODAL -->
<div class="modal-bg" id="imgModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <img id="mImg" src="" alt="">
    <h3 id="mName"></h3>
    <p id="mPrice" style="color:var(--purple);font-size:1.2rem;font-weight:800;margin-top:6px;"></p>
    <div style="margin-top:14px;display:flex;gap:10px;justify-content:center;">
      <button id="mCartBtn" onclick="addToCartModal()" class="btn btn-purple btn-sm">🛒 Add to Cart</button>
      <button onclick="closeModal()" class="btn btn-outline btn-sm">Close</button>
    </div>
  </div>
</div>

<footer>🌸 NG Srirangam Flower Shop — Srirangam, Tamil Nadu &nbsp;|&nbsp; 📱 WhatsApp Orders Welcome</footer>

<script>
let _mPk = null;
function openModal(pk, imgSrc, name, price) {
  _mPk = pk;
  document.getElementById('mImg').src   = imgSrc || '';
  document.getElementById('mName').textContent  = name;
  document.getElementById('mPrice').textContent = '₹' + price;
  document.getElementById('imgModal').classList.add('open');
}
function closeModal() { document.getElementById('imgModal').classList.remove('open'); }
document.getElementById('imgModal').addEventListener('click', e => { if(e.target===document.getElementById('imgModal')) closeModal(); });

function addToCartModal() {
  if(!_mPk) return;
  fetch(`/add-to-cart/${_mPk}/`).then(r=>r.json()).then(d => {
    document.querySelectorAll('.badge').forEach(b=>b.textContent=d.count);
    document.getElementById('mCartBtn').textContent = '✅ Added!';
    setTimeout(()=>{ document.getElementById('mCartBtn').textContent='🛒 Add to Cart'; },1500);
  });
}

function addToCart(pk, btn) {
  fetch(`/add-to-cart/${pk}/`).then(r=>r.json()).then(d => {
    document.querySelectorAll('.badge').forEach(b=>b.textContent=d.count);
    const orig = btn.textContent;
    btn.textContent='✅ Added!'; btn.style.background='#10b981';
    setTimeout(()=>{ btn.textContent=orig; btn.style.background=''; },1500);
  });
}

// Tab switcher
function switchTab(tabId) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelector(`[data-tab="${tabId}"]`).classList.add('active');
  document.getElementById(tabId).classList.add('active');
}
</script>
</body>
</html>
